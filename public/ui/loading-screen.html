<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planetwood Loading Screen</title>
  <style>
    :root {
      --teal-sky: #8cc5c0;
      --muted-teal: #75bdc3;
      --cloud-white: #ffffff;
      --deep-charcoal: #283436;
      --sage-green: #4e8c6d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--deep-charcoal);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--cloud-white);
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background-color: #283436;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #loading-screen.visible {
      opacity: 1;
      visibility: visible;
    }

    .planet-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }

    .planet-ring {
      position: absolute;
      border: 2px solid;
      border-radius: 50%;
    }

    .planet-ring.outer {
      width: 80px;
      height: 80px;
      border-color: rgba(78, 140, 109, 0.3);
      animation: spin 8s linear infinite;
    }

    .planet-ring.middle {
      width: 60px;
      height: 60px;
      border-color: rgba(78, 140, 109, 0.5);
      animation: spin 12s linear reverse infinite;
    }

    .planet-dot {
      width: 30px;
      height: 30px;
      background-color: var(--sage-green);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .planet-ring.outer,
      .planet-ring.middle {
        animation: none;
      }
      .planet-dot {
        animation: none;
        opacity: 1;
      }
    }

    .title {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-align: center;
    }

    .tagline {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 24px;
      text-align: center;
      max-width: 280px;
      line-height: 1.4;
    }

    .progress-container {
      width: 280px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--sage-green);
      transition: width 0.3s ease;
    }

    .status-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      min-height: 1.2em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="loading-screen" role="status" aria-live="polite">
    <div class="planet-container">
      <div class="planet-ring outer"></div>
      <div class="planet-ring middle"></div>
      <div class="planet-dot"></div>
    </div>
    <div class="title">PLANETWOOD</div>
    <div class="tagline">Discover the unknown</div>
    <div class="progress-container">
      <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
    <div class="status-text">Initializing...</div>
  </div>

  <script>
    const loadingScreen = (() => {
      const el = document.getElementById('loading-screen');
      const bar = el.querySelector('.progress-bar');
      const status = el.querySelector('.status-text');
      let isVisible = false;
      let proxyEl = null;
      let hidePending = false;

      function onTrapFocus(e) {
        if (e.key === 'Tab') {
          const focusable = el.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
          if (focusable.length === 0) return;
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault();
            last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
        if (e.key === 'Escape') e.preventDefault();
      }

      function addProxy() {
        if (proxyEl) return;
        proxyEl = document.createElement('div');
        proxyEl.style.position = 'absolute';
        proxyEl.style.width = '1px';
        proxyEl.style.height = '1px';
        proxyEl.setAttribute('tabindex', '0');
        el.appendChild(proxyEl);
      }

      function removeProxy() {
        if (proxyEl) { proxyEl.remove(); proxyEl = null; }
      }

      el.addEventListener('transitionend', () => {
        if (hidePending) {
          el.style.display = 'none';
          hidePending = false;
        }
      });

      return {
        show() {
          if (isVisible) return;
          el.style.display = '';
          el.classList.add('visible');
          isVisible = true;
          el.addEventListener('keydown', onTrapFocus);
          addProxy();
          if (proxyEl) requestAnimationFrame(() => proxyEl.focus());
        },
        hide() {
          if (!isVisible) return;
          el.classList.remove('visible');
          isVisible = false;
          el.removeEventListener('keydown', onTrapFocus);
          removeProxy();
          hidePending = true;
        },
        setProgress(value) {
          const v = Math.max(0, Math.min(100, value));
          bar.style.width = v + '%';
          bar.setAttribute('aria-valuenow', v);
        },
        setStatus(text) {
          status.textContent = text;
        }
      };
    })();

    window.LoadingScreen = loadingScreen;
  </script>
</body>
</html>
