<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetwood Animation Specs</title>
    <style>
    :root {
      --primary-green: #4e8c6d;
      --dark-bg: #283436;
      --surface: rgba(60, 72, 74, 0.9);
      --white-text: #ffffff;
      --muted-text: rgba(255, 255, 255, 0.6);
      --accent-hover: #5da37d;
      --border-color: rgba(255, 255, 255, 0.1);
      --radius: 8px;
      --font-body: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--fg);
            line-height: 1.6;
            padding: 20px;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            color: var(--accent);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            min-width: 200px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            background: var(--surface);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            min-width: 200px;
        }

        .filter-group label {
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--accent);
        }

        .filter-group select,
        .filter-group input {
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--fg);
            border-radius: 4px;
        }

        .clips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .clip-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .clip-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .clip-header {
            background: var(--accent);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clip-header h3 {
            margin: 0;
            font-size: 1.2rem;
        }

        .clip-controls {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .clip-content {
            padding: 20px;
        }

        .skeleton-preview {
            width: 100%;
            height: 150px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .skeleton-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .timeline-ruler {
            height: 30px;
            margin-bottom: 15px;
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .timeline-marker {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 2px;
            background: var(--accent);
        }

        .timeline-label {
            position: absolute;
            top: -20px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .attr-info {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .attr-row {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }
        .attr-label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .attr-value {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--accent);
        }
        .easing-sparklines {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sparkline {
            flex: 1;
            height: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            position: relative;
        }

        .sparkline-label {
            position: absolute;
            top: -20px;
            left: 0;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .sparkline-path {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2;
        }

        .bone-hierarchy {
            margin-bottom: 15px;
        }

        .bone-hierarchy h4 {
            margin-bottom: 8px;
            color: var(--accent);
        }

        .bone-tree {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--fg);
            line-height: 1.4;
        }

        .code-snippet {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            max-height: 120px;
            overflow-y: auto;
        }

        .keyframe-thumbnails {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .thumbnail {
            width: 50px;
            height: 50px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--muted);
            flex-shrink: 0;
        }

        .thumbnail.active {
            background: var(--accent);
            color: white;
        }

        .clip-footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--muted);
            padding: 0 15px 15px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            h1 {
                font-size: 2rem;
            }

            .filters {
                flex-direction: column;
            }

            .filter-group {
                width: 100%;
            }

            .clips-grid {
                grid-template-columns: 1fr;
            }
        }

        [aria-live] {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>

            <div class="filter-group">

                <input type="text" id="search-filter" placeholder="Search animation names...">
            </div>
        </div>
        
        <div class="clips-grid" id="clips-container">

    </div>

            const minutes = Math.floor(seconds / 60);

            const ms = Math.floor((seconds % 1) * 1000);

        const getEasingFunction = (type) => {
            const easings = {
                linear: t => t,
                easeInQuad: t => t * t,
                easeOutQuad: t => t * (2 - t),
                easeInOutQuad: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
                easeInCubic: t => t * t * t,
                easeOutCubic: t => --t * t * t + 1,
                easeInOutCubic: t => t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1,
                easeInSine: t => 1 - Math.cos(t * Math.PI / 2),
                easeOutSine: t => Math.sin(t * Math.PI / 2),
                easeInOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
                easeInExpo: t => t === 0 ? 0 : Math.pow(2, 10 * t - 10),
                easeOutExpo: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
                easeInOutExpo: t => t === 0 ? 0 : t === 1 ? 1 : t < 0.5 ? Math.pow(2, 20 * t - 10) / 2 : (2 - Math.pow(2, -20 * t + 10)) / 2,
                easeInBack: t => t * t * (2.70158 * t - 1.70158),
                easeOutBack: t => --t * t * (2.70158 * t + 1.70158) + 1,
                easeInOutBack: t => t < 0.5 ? (t * t * ((2.598675 * 2) * t - 2.598675 * 2)) / 2 : ((t - 1) * (t - 1) * ((2.598675 * 2) * (t - 1) + 2.598675 * 2) + 2) / 2,
                easeOutBounce: t => {
                    const n1 = 7.5625;
                    const d1 = 2.75;
                    if (t < 1 / d1) return n1 * t * t;
                    else if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
                    else if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
                    else return n1 * (t -= 2.625 / d1) * t + 0.984375;

                const indent = '  '.repeat(depth);
                lines.push(`${indent}${bone}`);
                
                if (skeleton.hierarchy[bone]) {

                        break;
                    }
                }
                if (!focused && focusable.length > 0) {
                    focusable[focusable.length - 1].focus();
                }
                e.preventDefault();
            } else if (e.key === 'Enter' || e.key === ' ') {
                // Trigger button click
                if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
                    document.activeElement.click();
                    e.preventDefault();
                }
            } else if (e.key === 'Escape') {
                // Pause any playing animations
                document.querySelectorAll('.play-btn').forEach(btn => {
                    if (!btn.disabled) {
                        btn.click();
                    }
                });
            }
        });
    </script>
</body>
</html>
