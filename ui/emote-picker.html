<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emote Picker - Planetwood</title>
  <style>
    :root {
      --primary-green: #4e8c6d;
      --dark-bg: rgba(40, 52, 54, 0.9);
      --white-text: #ffffff;
      --muted-text: rgba(255, 255, 255, 0.6);
      --accent-hover: #5da37d;
      --border: rgba(255, 255, 255, 0.1);
      --radius: 8px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --backdrop-blur: blur(8px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: transparent;
      overflow: hidden;
    }

    #emote-picker {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
      transform: translateY(20px);
    }

    #emote-picker.open {
      opacity: 1;
      visibility: visible;
      pointer-events: all;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      #emote-picker {
        transition: none;
      }
    }

    .emote-panel {
      background: var(--dark-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 300px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
    }

    .emote-button {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: background-color 0.15s ease, border-color 0.15s ease;
      user-select: none;
      outline: none;
      font-size: 11px;
      color: var(--white-text);
      text-align: center;
    }

    .emote-button:hover {
      background-color: rgba(255, 255, 255, 0.08);
      border-color: var(--border);
    }

    .emote-button:focus-visible {
      outline: 2px solid var(--primary-green);
    }

    .emote-button:active {
      transform: scale(0.95);
    }

    .emoji-icon {
      font-size: 48px;
      line-height: 1;
    }

    .emote-label {
      font-size: 11px;
      color: var(--muted-text);
      width: 100%;
      text-align: center;
    }

    @media (prefers-reduced-motion: reduce) {
      .emote-button {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div id="emote-picker" role="dialog" aria-label="Emote picker" aria-modal="true">
    <div class="emote-panel" role="grid">
    </div>
  </div>

  <script>
    class EmotePicker {
      constructor() {
        this.element = document.getElementById('emote-picker');
        this.panel = this.element.querySelector('.emote-panel');
        this.isOpen = false;
        this.lastFocusedElement = null;
        this.emotes = [
          { emoji: '👋', name: 'Wave' },
          { emoji: '💃', name: 'Dance' },
          { emoji: '👆', name: 'Point' },
          { emoji: '👏', name: 'Clap' },
          { emoji: '😂', name: 'Laugh' },
          { emoji: '🪑', name: 'Sit' },
          { emoji: '😴', name: 'Sleep' },
          { emoji: '❤️', name: 'Heart' },
          { emoji: '🙋', name: 'Bye' }
        ];

        this.init();
      }

      init() {
        this.render();
        this.bindEvents();
      }

      render() {
        this.panel.innerHTML = '';
        this.emotes.forEach(emote => {
          const button = document.createElement('button');
          button.className = 'emote-button';
          button.role = 'gridcell';
          button.setAttribute('aria-label', emote.name);
          button.innerHTML = `
            <div class="emoji-icon">${emote.emoji}</div>
            <div class="emote-label">${emote.name}</div>
          `;

          button.addEventListener('click', () => {
            this.selectEmote(emote);
          });

          this.panel.appendChild(button);
        });
      }

      bindEvents() {
        document.addEventListener('emote:open', () => this.open());

        document.addEventListener('keydown', (e) => {
          if (this.isOpen && e.key === 'Escape') {
            this.close();
          }
        });

        this.element.addEventListener('click', (e) => {
          if (this.isOpen && e.target === this.element) {
            this.close();
          }
        });
      }

      open() {
        if (this.isOpen) return;

        this.isOpen = true;
        this.lastFocusedElement = document.activeElement;
        this.element.classList.add('open');
        this.trapFocus();

        this.element.setAttribute('aria-live', 'polite');
        setTimeout(() => {
          this.element.removeAttribute('aria-live');
        }, 100);

        setTimeout(() => {
          const firstButton = this.panel.querySelector('.emote-button');
          if (firstButton) {
            firstButton.focus();
          }
        }, 10);
      }

      close() {
        if (!this.isOpen) return;

        this.isOpen = false;
        this.element.classList.remove('open');
        this.untrapFocus();

        if (this.lastFocusedElement) {
          this.lastFocusedElement.focus();
        }

        this.element.setAttribute('aria-live', 'polite');
        setTimeout(() => {
          this.element.removeAttribute('aria-live');
        }, 100);
      }

      selectEmote(emote) {
        const event = new CustomEvent('emote:select', {
          detail: {
            emoji: emote.emoji,
            name: emote.name
          }
        });
        document.dispatchEvent(event);

        this.close();
      }

      trapFocus() {
        this._onTrapKey = (e) => {
          if (e.key === 'Tab') {
            const buttons = this.panel.querySelectorAll('.emote-button');
            if (buttons.length === 0) return;
            const first = buttons[0];
            const last = buttons[buttons.length - 1];
            if (e.shiftKey && document.activeElement === first) {
              e.preventDefault();
              last.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
              e.preventDefault();
              first.focus();
            }
          }
        };
        this.panel.addEventListener('keydown', this._onTrapKey);
      }

      untrapFocus() {
        if (this._onTrapKey) {
          this.panel.removeEventListener('keydown', this._onTrapKey);
          this._onTrapKey = null;
        }
      }

      static open() {
        if (!window.emotePickerInstance) {
          window.emotePickerInstance = new EmotePicker();
        }
        window.emotePickerInstance.open();
      }

      static close() {
        if (window.emotePickerInstance) {
          window.emotePickerInstance.close();
        }
      }

      static get isOpen() {
        return window.emotePickerInstance ? window.emotePickerInstance.isOpen : false;
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        window.emotePickerInstance = new EmotePicker();
      });
    } else {
      window.emotePickerInstance = new EmotePicker();
    }
  </script>
</body>
</html>
