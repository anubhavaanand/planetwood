<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat Bubbles — 3D Game Overlay</title>
  <style>
    :root {
      --bg: rgba(40, 52, 54, 0.9);
      --name-color: #4e8c6d;
      --text-color: #ffffff;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      --radius: 8px;
      --blur: blur(4px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #chat-bubbles-root {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .chat-bubble {
      position: absolute;
      max-width: 200px;
      padding: 8px 14px;
      background: var(--bg);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
      transform: translate(-50%, -100%);
      opacity: 0;
      transition: opacity 0.3s ease-out, transform 0.3s ease-out;
      will-change: transform, opacity;
      pointer-events: none;
    }

    .chat-bubble.visible {
      opacity: 1;
      transform: translate(-50%, -100%);
    }

    .chat-bubble.fading-out {
      opacity: 0;
      transform: translate(-50%, calc(-100% - 12px));
      transition: opacity 1s ease-in, transform 1s ease-in;
    }

    .chat-bubble::after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(40, 52, 54, 0.9);
    }

    .chat-bubble__name {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--name-color);
      line-height: 1.2;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-bubble__text {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-color);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (prefers-reduced-motion: reduce) {
      .chat-bubble {
        transition: none;
      }
      .chat-bubble.visible {
        opacity: 1;
      }
      .chat-bubble.fading-out {
        opacity: 0;
      }
    }

    .sr-announcer {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="chat-bubbles-root" role="region" aria-label="Chat messages">
    <div class="sr-announcer" aria-live="polite" aria-atomic="true" id="bubble-announcer"></div>
  </div>

  <script>
    (function () {
      const root = document.getElementById('chat-bubbles-root');
      const announcer = document.getElementById('bubble-announcer');
      const bubbles = new Map();
      const SHOW_DURATION = 5000;
      const FADE_IN = 300;
      const FADE_OUT = 1000;
      const MAX_ANNOUNCE_LEN = 120;

      function createBubbleElement(id, name, text) {
        const el = document.createElement('div');
        el.className = 'chat-bubble';
        el.dataset.bubbleId = id;
        el.innerHTML = `
          <span class="chat-bubble__name">${escapeHtml(name)}</span>
          <span class="chat-bubble__text">${escapeHtml(text)}</span>
        `;
        return el;
      }

      function escapeHtml(str) {
        return str.replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        })[c]);
      }

      function announce(message) {
        const truncated = message.length > MAX_ANNOUNCE_LEN
          ? message.slice(0, MAX_ANNOUNCE_LEN - 1) + '…'
          : message;
        announcer.textContent = '';
        requestAnimationFrame(() => {
          announcer.textContent = truncated;
        });
      }

      function showMessage({ name, text }) {
        if (!name || !text) return;

        const existing = bubbles.get(name);
        if (existing) {
          clearTimeout(existing.hideTimer);
          clearTimeout(existing.fadeTimer);
          existing.el.classList.remove('fading-out');
          existing.el.classList.add('visible');
          existing.el.querySelector('.chat-bubble__text').textContent = escapeHtml(text);
          existing.showTime = Date.now();
          scheduleHide(name);
          return;
        }

        const id = 'bubble-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
        const el = createBubbleElement(id, name, text);
        root.appendChild(el);

        const bubble = { id, name, el, showTime: Date.now() };
        bubbles.set(name, bubble);

        requestAnimationFrame(() => {
          el.classList.add('visible');
        });

        announce(`${name}: ${text}`);
        scheduleHide(name);
      }

      function scheduleHide(name) {
        const bubble = bubbles.get(name);
        if (!bubble) return;

        bubble.hideTimer = setTimeout(() => {
          bubble.el.classList.remove('visible');
          bubble.el.classList.add('fading-out');
          bubble.fadeTimer = setTimeout(() => {
            bubble.el.remove();
            bubbles.delete(name);
          }, FADE_OUT);
        }, SHOW_DURATION);
      }

      function updatePositions(updates) {
        if (!Array.isArray(updates)) return;
        for (const { name, x, y } of updates) {
          const bubble = bubbles.get(name);
          if (bubble && bubble.el) {
            bubble.el.style.left = x + 'px';
            bubble.el.style.top = y + 'px';
          }
        }
      }

      function clearAll() {
        for (const [, bubble] of bubbles) {
          clearTimeout(bubble.hideTimer);
          clearTimeout(bubble.fadeTimer);
          bubble.el.remove();
        }
        bubbles.clear();
      }

      window.ChatBubbles = {
        showMessage,
        updatePositions,
        clearAll,
        get isOpen() { return bubbles.size > 0; }
      };
    })();
  </script>
</body>
</html>
